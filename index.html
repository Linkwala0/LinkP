        /* 🌌 Moving Animated Gradient Background */
        body {

            animation: gradientBG 12s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 550px; 
            padding: 40px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-buttons { width: 100%; display: flex; flex-direction: column; gap: 15px; margin-bottom: 35px; }

        .promo-btn {
            width: 100%; text-align: center; padding: 16px; border-radius: 12px;
            font-weight: bold; font-size: 17px; text-decoration: none;
            color: #ffffff; box-sizing: border-box; transition: transform 0.3s ease;
        }
        .promo-btn:hover { transform: scale(1.03); }
        .btn-main { background: linear-gradient(135deg, #8b3dff, #00f2fe); box-shadow: 0 5px 20px rgba(139, 61, 255, 0.5); animation: pulseGlowMain 2.5s infinite; }
        .btn-backup { background: linear-gradient(135deg, #ff007f, #ff7700); box-shadow: 0 5px 20px rgba(255, 0, 127, 0.5); animation: pulseGlowBackup 2.5s infinite; }

        .profile-pic {
            width: 110px; height: 110px; border-radius: 50%; object-fit: cover; object-position: top;
            border: 4px solid #ffffff; margin-bottom: 15px; box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: popIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        .profile-name {
            color: #ffffff; font-size: 26px; font-weight: bold; letter-spacing: 1px;
            margin-bottom: 15px; text-shadow: 2px 2px 10px rgba(0,0,0,0.4); animation: fadeInDown 1s ease forwards;

        .live-counter {

            box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: fadeInDown 1.2s ease forwards;
        }

        .pulse-dot {
            width: 12px; height: 12px; background-color: #00ff00; 
            border-radius: 50%; box-shadow: 0 0 12px #00ff00; animation: blink 1.5s infinite;
        }

        /* 🎛️ SORTING TABS STYLE */
        .tabs-container {
            width: 100%; display: flex; justify-content: space-between; 
            background: rgba(255, 255, 255, 0.15); padding: 6px; border-radius: 12px;
            margin-bottom: 25px; box-sizing: border-box; backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); animation: fadeInDown 1.4s ease forwards;
        }
        .tab-btn {
            flex: 1; border: none; background: transparent; padding: 12px 5px;
            color: #ffffff; font-weight: bold; font-size: 14px; border-radius: 8px;
            cursor: pointer; transition: all 0.3s ease; text-align: center;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            box-shadow: 0 4px 12px rgba(0, 242, 254, 0.4); color: #fff;
        }

        /* 🌟 Premium Link Box Design */
        .links-container { width: 100%; display: flex; flex-direction: column; gap: 16px; }

        .link-card {
            background-color: rgba(255, 255, 255, 0.95); width: 100%; display: flex; align-items: center;
            justify-content: space-between; gap: 12px; border-radius: 12px; border-left: 6px solid #ff007f; 
            padding: 10px; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            animation: popIn 0.5s ease forwards; /* Naya animation taaki tab switch smooth ho */
        }

        .link-content { display: flex; align-items: center; flex: 1; }
        .image-wrapper { position: relative; margin-right: 15px; }
        .link-image { width: 75px; height: 75px; object-fit: cover; object-position: top; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        
        /* 👁️ Views Badge Style */
        .views-badge {
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: #2c3e50; color: #fff; font-size: 10px; padding: 2px 6px;
            border-radius: 10px; font-weight: bold; white-space: nowrap; border: 1px solid #fff;
        }

        .text-wrapper { display: flex; flex-direction: column; }
        .link-text { font-weight: bold; font-size: 18px; color: #2c3e50; white-space: nowrap; }
        .pop-tag { font-size: 11px; color: #ff007f; font-weight: bold; margin-top: 2px; }

        .link-card:hover { transform: scale(1.02) translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); border-left: 6px solid #00f2fe; background-color: #ffffff; }

        .action-buttons { display: flex; flex-direction: column; gap: 8px; }
        .action-btn {
            display: flex; align-items: center; justify-content: center; padding: 8px 15px;
            border-radius: 6px; font-size: 13px; font-weight: bold; text-decoration: none;

        .action-btn:active { transform: scale(0.95); }
        .btn-tera { background: linear-gradient(135deg, #1e3c72, #2a5298); box-shadow: 0 3px 8px rgba(42, 82, 152, 0.4); }
        .btn-disk { background: linear-gradient(135deg, #ff7700, #ff007f); box-shadow: 0 3px 8px rgba(255, 0, 127, 0.4); }

        @media (max-width: 400px) {
            .tab-btn { font-size: 12px; padding: 10px 2px; }
            .action-btn { padding: 6px 10px; font-size: 11px; }
            .link-text { font-size: 15px; }
            .link-image { width: 65px; height: 65px; }
        }

        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes pulseGlowMain { 0% { box-shadow: 0 0 10px rgba(139, 61, 255, 0.4); } 50% { box-shadow: 0 0 25px rgba(139, 61, 255, 0.8); } 100% { box-shadow: 0 0 10px rgba(139, 61, 255, 0.4); } }
        @keyframes pulseGlowBackup { 0% { box-shadow: 0 0 10px rgba(255, 0, 127, 0.4); } 50% { box-shadow: 0 0 25px rgba(255, 0, 127, 0.8); } 100% { box-shadow: 0 0 10px rgba(255, 0, 127, 0.4); } }
        @keyframes bounceUpFade { 0% { opacity: 0; transform: translateY(40px); } 70% { transform: translateY(-8px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }

        // ==========================================

            document.getElementById(`tab-${sortType}`).classList.add('active');

            const container = document.getElementById('links-container');
            container.innerHTML = ""; // Purana clear karo

            let sortedPosts = [...allPosts];

            if (sortType === 'latest') {
                // SABSE NAYI PEHLE (Ulta order)
                sortedPosts.sort((a, b) => b.id - a.id);
            } 
            else if (sortType === 'viewed') {
                // SABSE ZYADA DEKHI JANE WALI
                sortedPosts.sort((a, b) => b.views - a.views);
            } 
            else if (sortType === 'popular') {
                // SABSE ZYADA POPULAR (Trending)
                sortedPosts.sort((a, b) => b.popularity - a.popularity);
            }

            // HTML banana

                        </div>
                    </div>
                `;
